fail_fast: false
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: check-byte-order-marker
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Format files with rustfmt.
        entry: cargo
        args: ["fmt"]
        language: system
        files: \.rs$
        pass_filenames: false
      - id: typos
        name: typos
        description: check typo
        entry: typos
        language: system
        files: \.*$
        pass_filenames: false
      - id: cargo-check
        name: cargo check
        description: Check the package for errors.
        entry: cargo
        args: ["check", "--workspace"]
        language: system
        files: \.rs$
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        description: Lint rust sources
        entry: cargo
        args: ["clippy", "--all-targets", "--all-features", "--workspace", "--tests", "--benches", "--", "-D", "warnings"]
        language: system
        files: \.rs$
        pass_filenames: false
      - id: cargo-test
        name: cargo test
        description: unit test for the project
        entry: cargo
        args: ["nextest", "run", "--all-features", "--workspace", "--no-tests", "pass"]
        language: system
        files: \.rs$
        pass_filenames: false
